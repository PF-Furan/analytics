<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Origin-PT — Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:      #0a0a0f;
      --surface: #111118;
      --border:  #1e1e2e;
      --accent:  #5865f2;
      --green:   #27ae60;
      --red:     #e74c3c;
      --yellow:  #f1c40f;
      --text:    #e0e0e8;
      --muted:   #666680;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── ヘッダー ─────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
    header span { color: var(--muted); font-size: 13px; margin-left: 4px; }

    /* ── レイアウト ───────────────────────────────── */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* ── カウンター ───────────────────────────────── */
    .counter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .counter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }
    .counter-card .label {
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .counter-card .value {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .counter-card .value.accent { color: var(--accent); }
    .counter-card .value.green  { color: var(--green); }
    .counter-card .value.red    { color: var(--red); }

    /* ── グラフグリッド ───────────────────────────── */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 768px) {
      .chart-grid { grid-template-columns: 1fr; }
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }
    .chart-card h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .chart-card.wide {
      grid-column: 1 / -1;
    }
    canvas { max-height: 280px; }

    /* ── フッター ─────────────────────────────────── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 24px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    #last-updated { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🛡️</div>
  <div>
    <h1>Origin-PT <span>Analytics</span></h1>
  </div>
  <div style="margin-left:auto; font-size:12px; color:var(--muted)" id="last-updated">読み込み中...</div>
</header>

<main>
  <!-- カウンターカード -->
  <div class="counter-row">
    <div class="counter-card">
      <div class="label">💬 総チャット数 (全期間)</div>
      <div class="value" style="color:var(--yellow)" id="cnt-messages">—</div>
    </div>
    <div class="counter-card">
      <div class="label">🛡️ 総防衛数 (全期間)</div>
      <div class="value accent" id="cnt-total">—</div>
    </div>
    <div class="counter-card">
      <div class="label">🔨 総処罰数 (全期間)</div>
      <div class="value red" id="cnt-punish">—</div>
    </div>
    <div class="counter-card">
      <div class="label">📊 直近 24h 検知</div>
      <div class="value green" id="cnt-24h">—</div>
    </div>
    <div class="counter-card">
      <div class="label">⚡ 直近 24h 処罰</div>
      <div class="value" id="cnt-24h-p">—</div>
    </div>
  </div>

  <!-- グラフ -->
  <div class="chart-grid">

    <!-- 円グラフ: スパム種別 -->
    <div class="chart-card">
      <h2>🥧 スパム種別分布</h2>
      <canvas id="pie-chart"></canvas>
    </div>

    <!-- 円グラフ: 処罰種別 -->
    <div class="chart-card">
      <h2>🔨 処罰種別</h2>
      <canvas id="punish-chart"></canvas>
    </div>

    <!-- 折れ線グラフ: 推移 -->
    <div class="chart-card wide">
      <h2>📈 防衛数推移 (直近 168 レコード)</h2>
      <canvas id="line-chart"></canvas>
    </div>

  </div>
</main>

<footer>Origin-PT Analytics Dashboard &nbsp;·&nbsp; Powered by Chart.js</footer>

<script>
// ── カラーパレット ──────────────────────────────────────────────
const COLORS = [
  '#5865f2','#27ae60','#e74c3c','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#3498db','#e91e63','#00bcd4',
  '#8bc34a','#ff5722','#607d8b','#795548','#9e9e9e',
];

// ── カウンターアニメーション ────────────────────────────────────
function animateCount(el, target, duration = 1200) {
  const start = performance.now();
  const from  = parseInt(el.textContent.replace(/,/g, '')) || 0;
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(from + (target - from) * ease).toLocaleString();
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Chart.js デフォルト設定 ─────────────────────────────────────
Chart.defaults.color = '#888';
Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";

let pieChart, punishChart, lineChart;

function buildPie(canvasId, labels, data, title) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: COLORS, borderWidth: 2, borderColor: '#111118' }]
    },
    options: {
      plugins: {
        legend: { position: 'right', labels: { boxWidth: 12, padding: 10, font: { size: 11 } } },
        title: { display: false },
        tooltip: { callbacks: {
          label: ctx => ` ${ctx.label}: ${ctx.parsed.toLocaleString()}`
        }}
      }
    }
  });
}

function buildLine(labels, detectData, punishData) {
  const ctx = document.getElementById('line-chart').getContext('2d');
  return new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '🛡️ 検知数',
          data: detectData,
          borderColor: '#5865f2',
          backgroundColor: 'rgba(88,101,242,0.12)',
          fill: true,
          tension: 0.3,
          pointRadius: detectData.length > 48 ? 0 : 3,
        },
        {
          label: '🔨 処罰数',
          data: punishData,
          borderColor: '#e74c3c',
          backgroundColor: 'rgba(231,76,60,0.08)',
          fill: true,
          tension: 0.3,
          pointRadius: punishData.length > 48 ? 0 : 3,
        }
      ]
    },
    options: {
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: { grid: { color: '#1e1e2e' }, ticks: { maxTicksLimit: 14, font: { size: 10 } } },
        y: { grid: { color: '#1e1e2e' }, beginAtZero: true }
      },
      plugins: { legend: { labels: { boxWidth: 12 } } }
    }
  });
}

// ── データ取得 & 描画 ───────────────────────────────────────────
async function refresh() {
  let stats;
  try {
    const r = await fetch('https://origin.pf-furan.com/api/stats');
    stats = await r.json();
  } catch (e) {
    document.getElementById('last-updated').textContent = 'データ取得失敗';
    return;
  }

  // カウンター
  animateCount(document.getElementById('cnt-messages'), stats.totals?.messages    || 0);
  animateCount(document.getElementById('cnt-total'),   stats.totals?.detections  || 0);
  animateCount(document.getElementById('cnt-punish'),  stats.totals?.punishments || 0);
  animateCount(document.getElementById('cnt-24h'),     stats.recent_24h?.detections  || 0);
  animateCount(document.getElementById('cnt-24h-p'),   stats.recent_24h?.punishments || 0);

  // 種別円グラフ
  const byType = stats.by_type || {};
  const ptLabels = Object.keys(byType);
  const ptData   = Object.values(byType);

  const pLabels = Object.keys(stats.punish_types || {});
  const pData   = Object.values(stats.punish_types || {});

  if (pieChart)    pieChart.destroy();
  if (punishChart) punishChart.destroy();
  if (lineChart)   lineChart.destroy();

  if (ptLabels.length) pieChart    = buildPie('pie-chart',    ptLabels, ptData);
  if (pLabels.length)  punishChart = buildPie('punish-chart', pLabels,  pData);

  // 折れ線グラフ
  const tl = stats.timeline || [];
  lineChart = buildLine(
    tl.map(e => e.label),
    tl.map(e => e.detections),
    tl.map(e => e.punishments),
  );

  // 最終更新時刻
  document.getElementById('last-updated').textContent =
    '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
}

// 初回 + 5分ごと自動更新
refresh();
setInterval(refresh, 300_000);
</script>
</body>
</html>
